
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    padding-top: 0.5rem;
  }

  .month-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.12s;
  }
  .month-card:hover { border-color: var(--color-border-secondary); transform: translateY(-1px); }
  .month-card.active { border: 2px solid var(--active-color, #1D9E75); }

  .month-header {
    padding: 12px 14px 10px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .month-name {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    margin-bottom: 2px;
  }
  .dest-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--color-text-primary);
    line-height: 1.2;
  }
  .dest-sub {
    font-size: 11px;
    color: var(--color-text-secondary);
    margin-top: 2px;
  }

  .month-bars { padding: 10px 14px 6px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .bar-label { font-size: 10px; color: var(--color-text-tertiary); width: 32px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 5px; background: var(--color-background-secondary); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

  .month-footer { padding: 8px 14px 11px; display: flex; gap: 5px; flex-wrap: wrap; }
  .pill {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.02em;
  }

  .detail-panel {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 12px;
    padding: 20px 22px;
    margin-top: 12px;
    display: none;
  }
  .detail-panel.open { display: block; }
  .detail-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
  .detail-title { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .detail-month-badge { font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 20px; white-space: nowrap; margin-top: 3px; }
  .detail-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 16px; }
  .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; margin-bottom: 16px; }
  .detail-stat { background: var(--color-background-secondary); border-radius: 8px; padding: 10px 12px; }
  .stat-label { font-size: 10px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
  .stat-val { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  .detail-vibe { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; padding-top: 12px; border-top: 0.5px solid var(--color-border-tertiary); }
  .detail-vibe strong { font-weight: 500; color: var(--color-text-primary); }
  .close-btn { font-size: 18px; color: var(--color-text-tertiary); background: none; border: none; cursor: pointer; padding: 0; line-height: 1; }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Bangalore surf calendar — best destination for each month of the year</h2>

<div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; padding-top:0.25rem; margin-bottom:12px;">
  <div>
    <div style="font-size:18px; font-weight:500; color:var(--color-text-primary);">Surf calendar</div>
    <div style="font-size:12px; color:var(--color-text-secondary); margin-top:2px;">Best spot from Bangalore — each month of the year</div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#1D9E75;"></div>Swell</div>
    <div class="legend-item"><div class="legend-dot" style="background:#378ADD;"></div>Crowd</div>
    <div class="legend-item"><div class="legend-dot" style="background:#EF9F27;"></div>Ease</div>
  </div>
</div>

<div class="cal-grid" id="calGrid"></div>
<div class="detail-panel" id="detailPanel">
  <div class="detail-top">
    <div>
      <div class="detail-title" id="dTitle"></div>
      <div class="detail-month-badge" id="dBadge"></div>
    </div>
    <button class="close-btn" onclick="closeDetail()">&#x2715;</button>
  </div>
  <div class="detail-desc" id="dDesc"></div>
  <div class="detail-grid" id="dGrid"></div>
  <div class="detail-vibe" id="dVibe"></div>
</div>

  {

let activeIdx = null;

function closeDetail() {
  activeIdx = null;
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('.month-card').forEach(c => c.classList.remove('active'));
}

function openDetail(i) {
  if (activeIdx === i) { closeDetail(); return; }
  activeIdx = i;
  const d = MONTHS[i];
  document.querySelectorAll('.month-card').forEach((c,j) => {
    c.classList.toggle('active', j === i);
    c.style.setProperty('--active-color', d.color);
  });

  document.getElementById('dTitle').textContent = d.dest;
  const badge = document.getElementById('dBadge');
  badge.textContent = d.m + ' · ' + d.region;
  badge.style.background = d.colorLight;
  badge.style.color = d.colorDark;

  document.getElementById('dDesc').textContent = d.desc;

  document.getElementById('dGrid').innerHTML = [
    {label:'Skill level', val: d.skill},
    {label:'Travel from BLR', val: d.travel},
    {label:'Best window', val: d.window},
    {label:'Scene', val: d.scene}
  ].map(s => `<div class="detail-stat"><div class="stat-label">${s.label}</div><div class="stat-val">${s.val}</div></div>`).join('');

  document.getElementById('dVibe').innerHTML = d.vibe;

  const panel = document.getElementById('detailPanel');
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function renderBar(pct, color) {
  return `<div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color};"></div></div>`;
}

const grid = document.getElementById('calGrid');
MONTHS.forEach((d, i) => {
  const card = document.createElement('div');
  card.className = 'month-card';
  card.onclick = () => openDetail(i);
  card.innerHTML = `
    <div class="month-header">
      <div class="month-name">${d.m}</div>
      <div class="dest-name">${d.dest}</div>
      <div class="dest-sub">${d.region}</div>
    </div>
    <div class="month-bars">
      <div class="bar-row"><span class="bar-label" style="font-size:10px;color:var(--color-text-tertiary);">Swell</span>${renderBar(d.swell,'#1D9E75')}</div>
      <div class="bar-row"><span class="bar-label" style="font-size:10px;color:var(--color-text-tertiary);">Crowd</span>${renderBar(d.crowd,'#378ADD')}</div>
      <div class="bar-row"><span class="bar-label" style="font-size:10px;color:var(--color-text-tertiary);">Ease</span>${renderBar(d.ease,'#EF9F27')}</div>
    </div>
    <div class="month-footer">
      ${d.pills.map(p=>`<span class="pill" style="background:${p.c};color:${p.tc};">${p.t}</span>`).join('')}
    </div>`;
  grid.appendChild(card);
});
</script>
